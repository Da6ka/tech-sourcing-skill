name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Check out into a directory whose path contains a space. Combined with
      # windows-latest, this exercises the validator's own path resolution —
      # the exact case that a bare new URL(...).pathname silently breaks.
      - name: Checkout into a path containing a space
        uses: actions/checkout@v4
        with:
          path: 'space dir'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate skill structure and links
        working-directory: 'space dir'
        run: node validate-skill.mjs
