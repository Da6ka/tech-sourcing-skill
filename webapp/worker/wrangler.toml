name = "tech-sourcing-webapp"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterDO"]

# The /api/source catch block returns a generic message and logs the real error, so
# retained logs are the only place upstream failures are visible after the fact.
# Without this, console.error is only observable during a live `wrangler tail`.
[observability]
enabled = true

# Secrets (set via `wrangler secret put`, never in this file):
#   ANTHROPIC_API_KEY
#   FIRECRAWL_API_KEY
